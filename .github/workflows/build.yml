name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: patch_plugins-linux
          - os: windows-latest
            artifact: patch_plugins-windows.exe
          - os: macos-latest
            artifact: patch_plugins-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: pyinstaller --onefile --name patch_plugins src/patcher.py

      - name: Rename binary
        shell: bash
        run: |
          cd dist
          mv patch_plugins* ${{ matrix.artifact }} 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  auto-tag:
    # Only runs on direct pushes to master, not on tag pushes (avoids loop)
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and push tag
        run: |
          latest=$(git tag -l "v*" | sort -V | tail -1)
          if [ -z "$latest" ]; then
            new_tag="v1.0.0"
          else
            major=$(echo "$latest" | cut -d. -f1 | tr -d v)
            minor=$(echo "$latest" | cut -d. -f2)
            patch=$(echo "$latest" | cut -d. -f3)
            new_tag="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Tagging $new_tag"
          git tag "$new_tag"
          git push origin "$new_tag"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/patch_plugins-linux
            dist/patch_plugins-windows.exe
            dist/patch_plugins-macos
